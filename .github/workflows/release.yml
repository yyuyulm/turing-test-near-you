name: Release

on:
  workflow_dispatch:
  release:
    types:
      - published

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: mkdir -p release-assets && zip -r "release-assets/turing-test-chrome.zip" dist/extension/chrome && zip -r "release-assets/turing-test-firefox.zip" dist/extension/firefox

      - uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: release-assets/*.zip
